<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>VFlat 뷰어</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --blue:#0D4EA2; --thsize:52px; }
  * { margin:0; box-sizing:border-box; }
  body { font-family:-apple-system,'Malgun Gothic',sans-serif; height:100vh; display:flex; flex-direction:column; background:#fff; }
  header { position:relative; display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid #e3e6eb; }
  header h1 { font-size:17px; color:var(--blue); margin-right:auto; }
  header button { border-radius:18px; padding:8px 18px; font-size:14px; cursor:pointer; }
  #signin { background:var(--blue); color:#fff; border:0; }
  #setBtn { background:#fff; color:var(--blue); border:1.5px solid var(--blue); display:none; }
  #panel { display:none; position:absolute; right:14px; top:50px; background:#fff; border:1px solid #dcdfe4;
           border-radius:10px; padding:14px 18px; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:9; font-size:14px; }
  body.panel #panel { display:block; }
  #panel label { display:block; margin:8px 0; }
  #main { flex:1; display:flex; min-height:0; }
  #folders { width:230px; overflow-y:auto; border-right:1px solid #e3e6eb; }
  .folder { display:flex; align-items:center; padding:11px 14px; cursor:pointer; font-size:14px; border-bottom:1px solid #f0f2f5; }
  .folder span { flex:1; }
  .folder:hover { background:#f1f3f6; }
  .folder.sel { background:var(--blue); color:#fff; }
  .fdel { display:none; border:0; background:#e53935; color:#fff; border-radius:6px; padding:4px 8px; cursor:pointer; font-size:12px; }
  body.edit .fdel { display:block; }
  #viewer { flex:1; display:flex; flex-direction:column; background:#111; min-width:0; }
  #thumbs { height:calc(var(--thsize) + 14px); display:none; gap:6px; overflow-x:auto; padding:6px 8px; background:#1c1c1c; flex-shrink:0; }
  #thumbs img { height:var(--thsize); border-radius:6px; cursor:pointer; opacity:.55; border:2px solid transparent; }
  #thumbs img.sel { opacity:1; border-color:#5B9BFF; }
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .nav { position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%;
         border:0; background:rgba(0,0,0,.45); color:#fff; font-size:24px; cursor:pointer; z-index:3; display:none; }
  .nav:hover { background:rgba(13,78,162,.85); }
  #prevBtn { left:12px; }
  #nextBtn { right:12px; }
  #img { max-width:100%; max-height:100%; transform-origin:center center; cursor:grab; user-select:none; -webkit-user-drag:none; }
  #info { position:absolute; top:10px; left:12px; color:#fff; background:rgba(0,0,0,.55); padding:5px 12px; border-radius:14px; font-size:13px; }
  #hint { position:absolute; bottom:10px; right:12px; color:#aaa; font-size:12px; }
  #empty { color:#888; font-size:15px; }
</style>
</head>
<body>
<header>
  <h1>📷 VFlat 뷰어</h1>
  <button id="setBtn">⚙ 설정</button>
  <button id="signin">구글 로그인</button>
  <div id="panel">
    <label>썸네일 크기<br><input type="range" id="thSize" min="40" max="130" step="2"></label>
    <label><input type="checkbox" id="delMode"> 폴더 삭제 모드</label>
  </div>
</header>
<div id="main">
  <div id="folders"></div>
  <div id="viewer">
    <div id="thumbs"></div>
    <div id="stage">
      <div id="empty">로그인하면 스캔 폴더가 나타납니다</div>
      <button id="prevBtn" class="nav">‹</button>
      <button id="nextBtn" class="nav">›</button>
      <img id="img" style="display:none" alt="">
      <div id="info" style="display:none"></div>
      <div id="hint">←/→ 이동 · +/− 확대/축소 · 휠 줌 · 더블클릭 리셋</div>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CLIENT_ID = "9958547442-37a3cf1gmijnd2dkvkf8cdgoaf813440.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/drive";
let token = null, folders = [], images = [], fIdx = -1, iIdx = -1;
let scale = 1, tx = 0, ty = 0, showSeq = 0;
const blobCache = new Map();

const $ = id => document.getElementById(id);
const img = $("img");

// ----- 설정 -----
const savedSize = localStorage.getItem("thsize") || 52;
document.documentElement.style.setProperty("--thsize", savedSize + "px");
$("thSize").value = savedSize;
$("thSize").oninput = e => {
  document.documentElement.style.setProperty("--thsize", e.target.value + "px");
  localStorage.setItem("thsize", e.target.value);
};
$("delMode").onchange = e => document.body.classList.toggle("edit", e.target.checked);
$("setBtn").onclick = () => document.body.classList.toggle("panel");

// ----- 로그인 -----
const tokenClient = google.accounts.oauth2.initTokenClient({
  client_id: CLIENT_ID, scope: SCOPE,
  callback: r => {
    token = r.access_token;
    $("signin").style.display = "none";
    $("setBtn").style.display = "inline-block";
    loadFolders();
  }
});
$("signin").onclick = () => tokenClient.requestAccessToken();

async function api(path, method, body) {
  const opt = { method: method || "GET", headers: { Authorization: "Bearer " + token } };
  if (body) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch("https://www.googleapis.com/drive/v3/" + path, opt);
  if (!r.ok) throw new Error("API 오류 " + r.status);
  return r.status === 204 ? null : r.json();
}

/** 원본 이미지를 blob URL로 (캐시 사용) */
async function fileBlobUrl(id) {
  if (blobCache.has(id)) return blobCache.get(id);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
    { headers: { Authorization: "Bearer " + token } });
  const url = URL.createObjectURL(await r.blob());
  blobCache.set(id, url);
  return url;
}

// ----- 폴더 -----
async function loadFolders(keepIdx) {
  $("empty").textContent = "불러오는 중...";
  const q1 = encodeURIComponent("name='VFlatScans' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const root = (await api(`files?q=${q1}&fields=files(id)`)).files[0];
  if (!root) { $("empty").textContent = "드라이브에 VFlatScans 폴더가 없습니다"; return; }
  const q2 = encodeURIComponent(`'${root.id}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  folders = (await api(`files?q=${q2}&orderBy=createdTime desc&pageSize=200&fields=files(id,name)`)).files;
  renderFolders();
  if (folders.length) openFolder(Math.min(keepIdx || 0, folders.length - 1), 0);
  else {
    images = []; fIdx = -1;
    $("thumbs").style.display = "none";
    img.style.display = "none"; $("info").style.display = "none";
    $("empty").style.display = ""; $("empty").textContent = "아직 전송된 스캔이 없습니다";
  }
}

function renderFolders() {
  const box = $("folders");
  box.innerHTML = "";
  folders.forEach((f, i) => {
    const d = document.createElement("div");
    d.className = "folder";
    const s = document.createElement("span");
    s.textContent = f.name;
    const del = document.createElement("button");
    del.className = "fdel";
    del.textContent = "삭제";
    del.onclick = ev => trashFolder(i, ev);
    d.append(s, del);
    d.onclick = () => openFolder(i, 0);
    box.appendChild(d);
  });
}

async function trashFolder(i, ev) {
  ev.stopPropagation();
  if (!confirm(`"${folders[i].name}" 폴더를 삭제할까요?\n(드라이브 휴지통으로 이동, 30일 내 복구 가능)`)) return;
  await api("files/" + folders[i].id, "PATCH", { trashed: true });
  loadFolders(fIdx === i ? i : (fIdx > i ? fIdx - 1 : fIdx));
}

// ----- 사진 -----
async function openFolder(i, startIdx) {
  fIdx = i;
  [...$("folders").children].forEach((el, k) => el.classList.toggle("sel", k === i));
  const q = encodeURIComponent(`'${folders[i].id}' in parents and trashed=false and mimeType contains 'image/'`);
  images = (await api(`files?q=${q}&orderBy=name&pageSize=500&fields=files(id,name,thumbnailLink)`)).files;
  renderThumbs();
  if (!images.length) {
    $("empty").style.display = ""; $("empty").textContent = "빈 폴더";
    img.style.display = "none"; $("info").style.display = "none";
    return;
  }
  show(startIdx < 0 ? images.length - 1 : startIdx);
}

function renderThumbs() {
  const t = $("thumbs");
  t.innerHTML = "";
  t.style.display = images.length ? "flex" : "none";
  images.forEach((f, i) => {
    const im = document.createElement("img");
    im.onclick = () => show(i);
    loadThumb(f, im);
    t.appendChild(im);
  });
}

/** 썸네일: 인증 붙여서 가져오고, 실패하면 원본으로 대체 */
async function loadThumb(f, im) {
  try {
    const r = await fetch(f.thumbnailLink, { headers: { Authorization: "Bearer " + token } });
    if (!r.ok) throw 0;
    im.src = URL.createObjectURL(await r.blob());
  } catch (e) {
    try { im.src = await fileBlobUrl(f.id); } catch (e2) { im.style.display = "none"; }
  }
}

async function show(i) {
  const my = ++showSeq;
  iIdx = i;
  resetView();
  [...$("thumbs").children].forEach((el, k) => el.classList.toggle("sel", k === i));
  $("thumbs").children[i]?.scrollIntoView({ inline: "nearest", block: "nearest" });
  $("empty").style.display = "none";
  $("info").style.display = "";
  $("info").textContent = `${folders[fIdx].name}  ·  ${i + 1}/${images.length}`;
  const url = await fileBlobUrl(images[i].id);
  if (my !== showSeq) return;          // 그 사이 다른 사진으로 넘어갔으면 무시
  img.src = url;
  img.style.display = "";
  $("prevBtn").style.display = $("nextBtn").style.display = "block";
  if (images[i + 1]) fileBlobUrl(images[i + 1].id);   // 다음 사진 미리 받기
  if (images[i - 1]) fileBlobUrl(images[i - 1].id);   // 이전 사진 미리 받기
}

function next() {
  if (iIdx < images.length - 1) show(iIdx + 1);
  else if (fIdx < folders.length - 1) openFolder(fIdx + 1, 0);
}
function prev() {
  if (iIdx > 0) show(iIdx - 1);
  else if (fIdx > 0) openFolder(fIdx - 1, -1);
}
$("prevBtn").onclick = prev;
$("nextBtn").onclick = next;

// ----- 확대/이동 -----
function apply() { img.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }
function resetView() { scale = 1; tx = ty = 0; apply(); }
function zoom(f) { scale = Math.min(12, Math.max(0.2, scale * f)); apply(); }

document.addEventListener("keydown", e => {
  if (!images.length) return;
  if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
  else if (e.key === "+" || e.key === "=") zoom(1.25);
  else if (e.key === "-" || e.key === "_") zoom(0.8);
  else if (e.key === "0") resetView();
});

$("stage").addEventListener("wheel", e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.15 : 0.87);
}, { passive: false });

img.addEventListener("dblclick", resetView);
let drag = null;
img.addEventListener("mousedown", e => { drag = { x: e.clientX - tx, y: e.clientY - ty }; e.preventDefault(); });
window.addEventListener("mousemove", e => { if (drag) { tx = e.clientX - drag.x; ty = e.clientY - drag.y; apply(); } });
window.addEventListener("mouseup", () => drag = null);
</script>
</body>
</html>
