<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>VFlat 뷰어</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --blue:#0D4EA2; --thsize:52px; }
  * { margin:0; box-sizing:border-box; }
  body { font-family:-apple-system,'Malgun Gothic',sans-serif; height:100vh; display:flex; flex-direction:column; background:#fff; }
  header { position:relative; display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid #e3e6eb; }
  header h1 { font-size:17px; color:var(--blue); margin-right:auto; }
  header button { border-radius:18px; padding:8px 18px; font-size:14px; cursor:pointer; }
  #signin { background:var(--blue); color:#fff; border:0; }
  #setBtn { background:#fff; color:var(--blue); border:1.5px solid var(--blue); display:none; }
  #panel { display:none; position:absolute; right:14px; top:50px; background:#fff; border:1px solid #dcdfe4;
           border-radius:10px; padding:14px 18px; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:9; font-size:14px; }
  body.panel #panel { display:block; }
  #panel label { display:block; margin:8px 0; }
  #main { flex:1; display:flex; min-height:0; }
  #folders { width:230px; overflow-y:auto; border-right:1px solid #e3e6eb; }
  .folder { display:flex; align-items:center; padding:11px 14px; cursor:pointer; font-size:14px; border-bottom:1px solid #f0f2f5; }
  .folder span { flex:1; }
  .folder:hover { background:#f1f3f6; }
  .folder.sel { background:var(--blue); color:#fff; }
  .fdel { display:none; border:0; background:#e53935; color:#fff; border-radius:6px; padding:4px 8px; cursor:pointer; font-size:12px; }
  body.edit .fdel { display:block; }
  .fedit { border:0; background:transparent; cursor:pointer; font-size:14px; opacity:.4; padding:2px 4px; }
  .fedit:hover { opacity:1; }
  .folder.sel .fedit { opacity:.85; }
  #viewer { flex:1; display:flex; flex-direction:column; background:#111; min-width:0; }
  #thumbs { height:calc(var(--thsize) + 14px); display:none; gap:6px; overflow-x:auto; padding:6px 8px; background:#1c1c1c; flex-shrink:0; }
  #thumbs img { height:var(--thsize); border-radius:6px; cursor:pointer; opacity:.55; border:2px solid transparent; }
  #thumbs img.sel { opacity:1; border-color:#5B9BFF; }
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .nav { position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%;
         border:0; background:rgba(0,0,0,.45); color:#fff; font-size:24px; cursor:pointer; z-index:3; display:none; }
  .nav:hover { background:rgba(13,78,162,.85); }
  #prevBtn { left:12px; }
  #nextBtn { right:12px; }
  #rotbar { position:absolute; bottom:10px; left:12px; display:none; gap:8px; z-index:3; }
  #rotbar button { width:40px; height:40px; border-radius:50%; border:0; background:rgba(0,0,0,.5);
                   color:#fff; font-size:19px; cursor:pointer; }
  #rotbar button:hover { background:rgba(13,78,162,.85); }
  #img { max-width:100%; max-height:100%; transform-origin:center center; cursor:grab; user-select:none; -webkit-user-drag:none; }
  #info { position:absolute; top:10px; left:12px; color:#fff; background:rgba(0,0,0,.55); padding:5px 12px; border-radius:14px; font-size:13px; }
  #hint { position:absolute; bottom:10px; right:12px; color:#aaa; font-size:12px; }
  #empty { color:#888; font-size:15px; }
</style>
</head>
<body>
<header>
  <h1>📷 VFlat 뷰어 <small style="font-size:11px;color:#999;font-weight:normal">v9</small></h1>
  <button id="refreshBtn" style="display:none">🔄 새로고침</button>
  <button id="setBtn">⚙ 설정</button>
  <button id="signin">구글 로그인</button>
  <div id="panel">
    <label>썸네일 크기<br><input type="range" id="thSize" min="40" max="130" step="2"></label>
    <label><input type="checkbox" id="autoLogin" checked> 자동 로그인</label>
    <label><input type="checkbox" id="autoRefresh" checked> 자동 갱신 (30초)</label>
    <label><input type="checkbox" id="delMode"> 폴더 삭제 모드</label>
  </div>
</header>
<div id="main">
  <div id="folders"></div>
  <div id="viewer">
    <div id="thumbs"></div>
    <div id="stage">
      <div id="empty">로그인하면 스캔 폴더가 나타납니다</div>
      <button id="prevBtn" class="nav">‹</button>
      <button id="nextBtn" class="nav">›</button>
      <img id="img" style="display:none" alt="">
      <div id="info" style="display:none"></div>
      <div id="rotbar">
        <button id="rotLeft" title="왼쪽으로 회전 ([)">↺</button>
        <button id="rotRight" title="오른쪽으로 회전 (])">↻</button>
      </div>
      <div id="hint">←/→ 이동 · +/− 줌 · [ ] 회전 · 더블클릭 리셋</div>
    </div>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
