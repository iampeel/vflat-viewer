<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>VFlat 뷰어</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --blue:#0D4EA2; }
  * { margin:0; box-sizing:border-box; }
  body { font-family:-apple-system,'Malgun Gothic',sans-serif; height:100vh; display:flex; flex-direction:column; background:#fff; }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid #e3e6eb; }
  header h1 { font-size:17px; color:var(--blue); }
  #signin { margin-left:auto; background:var(--blue); color:#fff; border:0; border-radius:18px; padding:8px 18px; font-size:14px; cursor:pointer; }
  #main { flex:1; display:flex; min-height:0; }
  #folders { width:230px; overflow-y:auto; border-right:1px solid #e3e6eb; }
  .folder { padding:11px 14px; cursor:pointer; font-size:14px; border-bottom:1px solid #f0f2f5; }
  .folder:hover { background:#f1f3f6; }
  .folder.sel { background:var(--blue); color:#fff; }
  .folder small { opacity:.65; }
  #viewer { flex:1; position:relative; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center; }
  #img { max-width:100%; max-height:100%; transform-origin:center center; cursor:grab; user-select:none; -webkit-user-drag:none; }
  #info { position:absolute; top:10px; left:12px; color:#fff; background:rgba(0,0,0,.55); padding:5px 12px; border-radius:14px; font-size:13px; }
  #hint { position:absolute; bottom:10px; right:12px; color:#aaa; font-size:12px; }
  #empty { color:#888; font-size:15px; }
</style>
</head>
<body>
<header>
  <h1>📷 VFlat 뷰어</h1>
  <button id="signin">구글 로그인</button>
</header>
<div id="main">
  <div id="folders"></div>
  <div id="viewer">
    <div id="empty">로그인하면 스캔 폴더가 나타납니다</div>
    <img id="img" style="display:none" alt="">
    <div id="info" style="display:none"></div>
    <div id="hint">←/→ 이동 · +/− 확대/축소 · 휠 줌 · 더블클릭 리셋</div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CLIENT_ID = "9958547442-37a3cf1gmijnd2dkvkf8cdgoaf813440.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/drive.readonly";
let token = null, folders = [], images = [], fIdx = -1, iIdx = -1;
let scale = 1, tx = 0, ty = 0;

const $ = id => document.getElementById(id);
const img = $("img");

const tokenClient = google.accounts.oauth2.initTokenClient({
  client_id: CLIENT_ID, scope: SCOPE,
  callback: r => { token = r.access_token; $("signin").style.display = "none"; loadFolders(); }
});
$("signin").onclick = () => tokenClient.requestAccessToken();

async function api(path) {
  const r = await fetch("https://www.googleapis.com/drive/v3/" + path,
    { headers: { Authorization: "Bearer " + token } });
  if (!r.ok) throw new Error("API 오류 " + r.status);
  return r.json();
}

async function loadFolders() {
  $("empty").textContent = "불러오는 중...";
  const q1 = encodeURIComponent("name='VFlatScans' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const root = (await api(`files?q=${q1}&fields=files(id)`)).files[0];
  if (!root) { $("empty").textContent = "드라이브에 VFlatScans 폴더가 없습니다"; return; }
  const q2 = encodeURIComponent(`'${root.id}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  folders = (await api(`files?q=${q2}&orderBy=createdTime desc&pageSize=200&fields=files(id,name,createdTime)`)).files;
  const box = $("folders");
  box.innerHTML = "";
  folders.forEach((f, i) => {
    const d = document.createElement("div");
    d.className = "folder";
    d.textContent = f.name;
    d.onclick = () => openFolder(i, 0);
    box.appendChild(d);
  });
  if (folders.length) openFolder(0, 0);
  else $("empty").textContent = "아직 전송된 스캔이 없습니다";
}

async function openFolder(i, startIdx) {
  fIdx = i;
  [...$("folders").children].forEach((el, k) => el.classList.toggle("sel", k === i));
  const q = encodeURIComponent(`'${folders[i].id}' in parents and trashed=false and mimeType contains 'image/'`);
  images = (await api(`files?q=${q}&orderBy=name&pageSize=500&fields=files(id,name)`)).files;
  if (!images.length) { $("empty").style.display = ""; $("empty").textContent = "빈 폴더"; img.style.display = "none"; return; }
  show(startIdx < 0 ? images.length - 1 : startIdx);
}

async function show(i) {
  iIdx = i;
  resetView();
  $("empty").style.display = "none";
  $("info").style.display = "";
  $("info").textContent = `${folders[fIdx].name}  ·  ${i + 1}/${images.length}`;
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${images[i].id}?alt=media`,
    { headers: { Authorization: "Bearer " + token } });
  const url = URL.createObjectURL(await r.blob());
  img.onload = () => URL.revokeObjectURL(img.dataset.old || "");
  img.dataset.old = url;
  img.src = url;
  img.style.display = "";
}

function next() {
  if (iIdx < images.length - 1) show(iIdx + 1);
  else if (fIdx < folders.length - 1) openFolder(fIdx + 1, 0);
}
function prev() {
  if (iIdx > 0) show(iIdx - 1);
  else if (fIdx > 0) openFolder(fIdx - 1, -1);
}

function apply() { img.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }
function resetView() { scale = 1; tx = ty = 0; apply(); }
function zoom(f) { scale = Math.min(12, Math.max(0.2, scale * f)); apply(); }

document.addEventListener("keydown", e => {
  if (!images.length) return;
  if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
  else if (e.key === "+" || e.key === "=") zoom(1.25);
  else if (e.key === "-" || e.key === "_") zoom(0.8);
  else if (e.key === "0") resetView();
});

$("viewer").addEventListener("wheel", e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.15 : 0.87);
}, { passive: false });

img.addEventListener("dblclick", resetView);
let drag = null;
img.addEventListener("mousedown", e => { drag = { x: e.clientX - tx, y: e.clientY - ty }; e.preventDefault(); });
window.addEventListener("mousemove", e => { if (drag) { tx = e.clientX - drag.x; ty = e.clientY - drag.y; apply(); } });
window.addEventListener("mouseup", () => drag = null);
</script>
</body>
</html>
